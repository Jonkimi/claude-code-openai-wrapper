version: '3'
services:
  claude-wrapper:
    build: .
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ~/.claude:/root/.claude
      # Optional: Mount a specific workspace directory
      # Uncomment and modify the line below to use a custom workspace
      # - ./workspace:/workspace
    environment:
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - PORT=${PORT:-8000}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_API_URL=${ANTHROPIC_BASE_URL:-}
      - API_KEY=${API_KEY:-f6XWBYrcIacvamMfcRNfTT_kWBiIVMXd}
      - MAX_TIMEOUT=${MAX_TIMEOUT:-600000}
      - CLAUDE_AGENT_SDK_SKIP_VERSION_CHECK=${CLAUDE_AGENT_SDK_SKIP_VERSION_CHECK:-1}
      # Optional: Set Claude's working directory (defaults to isolated temp dir)
      # Uncomment and modify the line below to set a custom working directory
      #- CLAUDE_CWD=${CLAUDE_CWD:-/workspace}
